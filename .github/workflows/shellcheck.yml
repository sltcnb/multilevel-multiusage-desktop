name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck --version

      - name: Run shellcheck (warning severity)
        run: |
          # -x follows sourced files (lib/common.sh); fail on warnings and above.
          shellcheck -x -S warning \
            setup.sh \
            lib/*.sh \
            host/*.sh \
            environments/*.sh \
            installer/*.sh \
            build/*.sh
